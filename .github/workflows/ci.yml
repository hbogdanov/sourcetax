name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Contract tests
        run: |
          python -m pytest -q tests/test_gold_enforcement.py tests/test_taxonomy_enforcement.py
          python -m pytest -q tests/test_generate_pairs.py tests/test_generate_synthetic_gapfill.py
      - name: External tools help
        run: |
          python tools/import_hf_mitulshah.py --help
          python tools/build_mitulshah_corpus.py --help
      - name: Smoke run
        run: python tools/smoke_run.py
